services:
  - type: web
    name: halo-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python _server.py
    envVars:
      - key: HALO_CLOUD
        value: "1"
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: halo-data
      mountPath: /opt/render/project/src/Ops files
      sizeGB: 1
